<!DOCTYPE html>
<html>
<head>
<title>forest4</title>

<style>
body{
  margin:0;
  background:black;
  overflow:hidden;
}

/* CONTENEDOR */
.container{
  position:relative;
  width:100%;
  height:100vh;
}

/* IMAGEN BASE */
.base{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
}

/* LATIDO SUAVE SOLO EN EL CENTRO */
.pulse{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;

  mask-image: radial-gradient(circle at center, white 0%, transparent 60%);
  -webkit-mask-image: radial-gradient(circle at center, white 0%, transparent 60%);

  animation: breathe 8s infinite ease-in-out;
}

@keyframes breathe{
  0%   {transform: scale(1);}
  50%  {transform: scale(1.008);}
  100% {transform: scale(1);}
}

/* OSCURECIMIENTO AMBIENTE */
.dark{
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.2);
  animation: fade 10s infinite alternate ease-in-out;
}

@keyframes fade{
  from {background:rgba(0,0,0,0.1);}
  to   {background:rgba(0,0,0,0.35);}
}

/* GLITCH MUY SUAVE (lineas leves) */
.glitch{
  position:absolute;
  width:100%;
  height:100%;
  pointer-events:none;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(255,255,255,0.03) 3px
  );
  animation: glitchMove 2s infinite;
}

@keyframes glitchMove{
  0% {transform: translateY(0);}
  50% {transform: translateY(2px);}
  100% {transform: translateY(0);}
}

/* ZONA CLICKEABLE (CENTRO) */
.center-hitbox{
  position:absolute;
  top:50%;
  left:50%;
  width:200px;
  height:200px;
  transform:translate(-50%, -50%);
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

  <img src="Forest_Minigame_20260321190558.png" class="base">
  <img src="Forest_Minigame_20260321190558.png" class="pulse">

  <div class="dark"></div>
  <div class="glitch"></div>

  <!-- SOLO ESTA ZONA REDIRIGE -->
  <div class="center-hitbox" id="hit"></div>

</div>

<audio id="forest-audio" src="FOREST4.mp3" loop></audio>

<script>
const audio = document.getElementById("forest-audio");

// 🔊 activar sonido
document.addEventListener("click", () => {
    audio.play().catch(() => {});
}, { once: true });
</script>

<script>
// clic SOLO en el centro
hit.addEventListener("click", ()=>{
  audio.volume = 0.4;
  audio.play().catch(()=>{});

  setTimeout(()=>{
    window.location.href = "FOREST5.html";
  }, 600);
});

// micro variación de volumen (natural)
setInterval(()=>{
  audio.volume = 0.35 + Math.random()*0.1;
}, 2000);
</script>

</body>
</html>
